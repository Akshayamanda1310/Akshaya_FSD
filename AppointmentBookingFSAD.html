<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseBook - Appointment Scheduling System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        * {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 150ms;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .service-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .nav-link {
            position: relative;
        }
        
        .nav-link:after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: -2px;
            left: 0;
            background-color: #3b82f6;
        }
        
        .nav-link:hover:after {
            width: 100%;
        }
        
        .modal {
            animation: modalPop 0.3s ease forwards;
        }
        
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <!-- NAVBAR -->
    <nav class="bg-white border-b shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-2xl">
                        📅
                    </div>
                    <h1 class="logo-font text-3xl font-semibold tracking-tighter text-gray-900">EaseBook</h1>
                </div>

                <div class="flex items-center gap-x-8 text-sm font-medium">
                    <a onclick="switchPage('home')" class="nav-link cursor-pointer text-gray-700 hover:text-blue-600">Home</a>
                    <a onclick="switchPage('booking')" class="nav-link cursor-pointer text-gray-700 hover:text-blue-600">Book Now</a>
                    <a onclick="switchPage('dashboard')" class="nav-link cursor-pointer text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a onclick="switchPage('admin')" id="admin-nav" class="nav-link cursor-pointer text-gray-700 hover:text-blue-600">Admin Panel</a>
                </div>

                <div class="flex items-center gap-x-4">
                    <div class="flex bg-gray-100 rounded-3xl p-1 text-sm">
                        <div onclick="setRole('customer')" id="role-customer" class="role-btn px-5 py-2 rounded-3xl font-medium cursor-pointer">Customer</div>
                        <div onclick="setRole('provider')" id="role-provider" class="role-btn px-5 py-2 rounded-3xl font-medium cursor-pointer">Provider</div>
                        <div onclick="setRole('admin')" id="role-admin" class="role-btn px-5 py-2 rounded-3xl font-medium cursor-pointer">Admin</div>
                    </div>

                    <div class="flex items-center gap-x-3 bg-white border rounded-3xl px-4 py-2">
                        <div class="text-right">
                            <p id="current-user-name" class="font-semibold text-gray-800">Gangotri Samhitha</p>
                            <p id="current-user-role" class="text-xs text-blue-600">Customer • ID: 2420030597</p>
                        </div>
                        <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-indigo-500 text-white rounded-2xl flex items-center justify-center text-xl">
                            👩‍🎓
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div id="content" class="max-w-7xl mx-auto px-6 py-8 min-h-[calc(100vh-64px)]"></div>

    <!-- BOOKING MODAL -->
    <div id="booking-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="modal bg-white rounded-3xl shadow-2xl max-w-lg w-full mx-4 overflow-hidden">
            <div class="px-8 pt-8 pb-6 border-b flex justify-between items-center">
                <h2 class="text-2xl font-semibold">Create New Booking</h2>
                <button onclick="closeBookingModal()" class="text-3xl text-gray-400 hover:text-gray-600">×</button>
            </div>
            
            <div class="p-8 space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Service</label>
                    <select id="modal-service" class="w-full border rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Provider</label>
                    <select id="modal-provider" class="w-full border rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Date</label>
                    <input type="date" id="modal-date" class="w-full border rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Time Slot</label>
                    <div id="time-slots" class="grid grid-cols-4 gap-3"></div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="confirmBooking()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-3xl">
                        Confirm Booking
                    </button>
                    <button onclick="closeBookingModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 font-semibold py-4 rounded-3xl">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- SUCCESS MODAL -->
    <div id="success-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="modal bg-white rounded-3xl p-10 max-w-md text-center">
            <div class="text-7xl mb-6">🎉</div>
            <h2 class="text-3xl font-semibold mb-3">Booking Confirmed!</h2>
            <p id="success-text" class="text-gray-600 mb-8"></p>
            <button onclick="hideSuccessModal()" class="bg-blue-600 text-white px-10 py-4 rounded-3xl font-semibold w-full">
                Go to Dashboard
            </button>
        </div>
    </div>

    <script>
        let currentRole = 'customer';
        let currentUser = { name: "Gangotri Samhitha", id: "2420030597" };

        let services = [
            { id: 1, name: "Consultation", description: "Expert consultation services", icon: "👨‍⚕️", providers: ["Dr. Priya Sharma", "Mr. Rajesh Kumar"] },
            { id: 2, name: "AC Repair", description: "Professional AC repair & maintenance", icon: "❄️", providers: ["CoolTech Solutions", "Vikas AC Experts"] },
            { id: 3, name: "Tutoring", description: "One-on-one tutoring sessions", icon: "📚", providers: ["Prof. Neha Rao", "Mr. Arjun Menon"] },
            { id: 4, name: "Plumbing", description: "Emergency & routine plumbing", icon: "🔧", providers: ["QuickFix Plumbing", "HydroCare"] },
            { id: 5, name: "Haircut & Styling", description: "Professional salon services", icon: "✂️", providers: ["StyleHub", "GlamSquad"] }
        ];

        let bookings = [
            { id: 1001, customer: "GANGOTRI SAMHITHA", service: "Consultation", provider: "Dr. Priya Sharma", date: "2026-04-02", time: "11:00 AM", status: "Confirmed" },
            { id: 1002, customer: "GANGOTRI SAMHITHA", service: "AC Repair", provider: "CoolTech Solutions", date: "2026-04-08", time: "03:30 PM", status: "Pending" },
            { id: 1004, customer: "GANGOTRI SAMHITHA", service: "Plumbing", provider: "QuickFix Plumbing", date: "2026-04-12", time: "09:00 AM", status: "Confirmed" }
        ];

        let selectedTime = null;

        function setRole(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => {
                btn.classList.toggle('bg-blue-600', btn.id === `role-${role}`);
                btn.classList.toggle('text-white', btn.id === `role-${role}`);
            });

            if (role === 'customer') {
                currentUser = { name: "Gangotri Samhitha", id: "2420030597" };
            } else if (role === 'provider') {
                currentUser = { name: "Kartikeya Yenumula", id: "2420030626" };
            } else {
                currentUser = { name: "Administrator", id: "ADMIN-001" };
            }

            document.getElementById('current-user-name').textContent = currentUser.name;
            document.getElementById('current-user-role').innerHTML = `${role.charAt(0).toUpperCase() + role.slice(1)} • ID: ${currentUser.id}`;
            
            if (document.getElementById('content').innerHTML.includes('Dashboard')) switchPage('dashboard');
        }

        function switchPage(page) {
            if (page === 'home') renderHome();
            else if (page === 'booking') renderBookingPage();
            else if (page === 'dashboard') renderDashboard();
            else if (page === 'admin') {
                if (currentRole !== 'admin') {
                    alert("Please switch to Admin role first!");
                    setRole('admin');
                }
                renderDashboard();
            }
        }

        function renderHome() {
            let html = `
            <div>
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h1 class="text-5xl font-semibold tracking-tighter logo-font">Welcome back, ${currentUser.name}!</h1>
                        <p class="text-gray-600 mt-3 text-xl">Book services instantly across multiple categories</p>
                    </div>
                    <button onclick="switchPage('booking')" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-3xl font-semibold flex items-center gap-3">
                        <i class="fas fa-plus"></i> Book Now
                    </button>
                </div>

                <h2 class="text-2xl font-semibold mb-6">All Services</h2>
                <div id="services-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6"></div>
            </div>`;
            
            document.getElementById('content').innerHTML = html;
            renderServices();
        }

        function renderServices() {
            const container = document.getElementById('services-grid');
            let cards = '';
            services.forEach(service => {
                cards += `
                <div class="service-card bg-white border rounded-3xl p-6 hover:shadow-xl">
                    <div class="text-6xl mb-6">${service.icon}</div>
                    <h3 class="text-2xl font-semibold mb-2">${service.name}</h3>
                    <p class="text-gray-600 text-sm mb-8">${service.description}</p>
                    <button onclick="quickBook(${service.id})" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-3xl font-medium">
                        Book Now
                    </button>
                </div>`;
            });
            container.innerHTML = cards;
        }

        function quickBook(id) {
            const service = services.find(s => s.id === id);
            if (service) openBookingModal(service);
        }

        function renderBookingPage() {
            let html = `
            <div class="max-w-4xl mx-auto">
                <h1 class="text-4xl font-semibold text-center mb-10 logo-font">Book Your Appointment</h1>
                <div id="booking-services-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>`;
            document.getElementById('content').innerHTML = html;
            renderBookingServices();
        }

        function renderBookingServices() {
            const container = document.getElementById('booking-services-list');
            let html = '';
            services.forEach(service => {
                html += `
                <div onclick="openBookingModalFromList(${service.id})" class="bg-white border rounded-3xl p-6 hover:border-blue-500 cursor-pointer">
                    <div class="flex items-center gap-4">
                        <span class="text-5xl">${service.icon}</span>
                        <div>
                            <h3 class="font-semibold text-xl">${service.name}</h3>
                            <p class="text-gray-600">${service.description}</p>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function openBookingModalFromList(id) {
            const service = services.find(s => s.id === id);
            openBookingModal(service);
        }

        function openBookingModal(service = null) {
            const modal = document.getElementById('booking-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');

            const serviceSelect = document.getElementById('modal-service');
            serviceSelect.innerHTML = '<option value="">Select Service</option>';
            services.forEach(s => {
                const selected = service && s.id === service.id ? 'selected' : '';
                serviceSelect.innerHTML += `<option value="${s.id}" ${selected}>${s.name}</option>`;
            });

            serviceSelect.onchange = () => {
                const selectedService = services.find(s => s.id == serviceSelect.value);
                if (selectedService) updateProviders(selectedService);
            };

            if (service) updateProviders(service);
        }

        function updateProviders(service) {
            const providerSelect = document.getElementById('modal-provider');
            providerSelect.innerHTML = '<option value="">Select Provider</option>';
            service.providers.forEach(p => {
                providerSelect.innerHTML += `<option value="${p}">${p}</option>`;
            });
            renderTimeSlots();
        }

        function renderTimeSlots() {
            const container = document.getElementById('time-slots');
            const times = ["09:00 AM","10:00 AM","11:00 AM","12:00 PM","02:00 PM","03:00 PM","04:00 PM","05:00 PM"];
            let html = '';
            times.forEach(time => {
                html += `<button onclick="selectTime('${time}', this)" class="border py-3 rounded-2xl hover:bg-blue-50 text-sm">${time}</button>`;
            });
            container.innerHTML = html;
        }

        function selectTime(time, btn) {
            document.querySelectorAll('#time-slots button').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            btn.classList.add('bg-blue-600', 'text-white');
            selectedTime = time;
        }

        function closeBookingModal() {
            document.getElementById('booking-modal').classList.add('hidden');
            selectedTime = null;
        }

        function confirmBooking() {
            const serviceId = document.getElementById('modal-service').value;
            const provider = document.getElementById('modal-provider').value;
            const date = document.getElementById('modal-date').value;

            if (!serviceId || !provider || !date || !selectedTime) {
                alert("Please fill all fields and select a time slot!");
                return;
            }

            const service = services.find(s => s.id == serviceId);

            const newBooking = {
                id: Date.now(),
                customer: currentUser.name,
                service: service.name,
                provider: provider,
                date: date,
                time: selectedTime,
                status: "Pending"
            };

            bookings.unshift(newBooking);
            closeBookingModal();

            document.getElementById('success-text').innerHTML = `
                <strong>${service.name}</strong> with <strong>${provider}</strong><br>
                on <strong>${date}</strong> at <strong>${selectedTime}</strong>
            `;
            document.getElementById('success-modal').classList.remove('hidden');
        }

        function hideSuccessModal() {
            document.getElementById('success-modal').classList.add('hidden');
            switchPage('dashboard');
        }

        function renderDashboard() {
            let html = `<h1 class="text-4xl font-semibold mb-8">Dashboard</h1>`;
            
            if (currentRole === 'customer') {
                html += `<div class="bg-white rounded-3xl p-8"><h2 class="text-2xl font-semibold mb-6">My Bookings</h2><div id="customer-bookings"></div></div>`;
            } else if (currentRole === 'provider') {
                html += `<div class="bg-white rounded-3xl p-8"><h2 class="text-2xl font-semibold mb-6">Assigned Appointments</h2><div id="provider-bookings"></div></div>`;
            } else {
                html += `<div class="bg-white rounded-3xl p-8"><h2 class="text-2xl font-semibold mb-6">All Bookings (Admin)</h2><div id="admin-bookings"></div></div>`;
            }
            
            document.getElementById('content').innerHTML = html;
            
            if (currentRole === 'customer') renderCustomerBookings();
            else if (currentRole === 'provider') renderProviderBookings();
            else renderAdminBookings();
        }

        function renderCustomerBookings() {
            const myBookings = bookings.filter(b => b.customer === currentUser.name);
            let html = '';
            myBookings.forEach(b => {
                html += `
                <div class="border-b py-6 flex justify-between items-center">
                    <div>
                        <div class="font-medium">${b.service}</div>
                        <div class="text-sm text-gray-500">${b.provider} • ${b.date} ${b.time}</div>
                    </div>
                    <div class="px-5 py-2 text-xs font-medium rounded-3xl ${b.status === 'Confirmed' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">
                        ${b.status}
                    </div>
                </div>`;
            });
            document.getElementById('customer-bookings').innerHTML = html || '<p class="text-gray-500 py-8">No bookings yet</p>';
        }

        function renderProviderBookings() {
            let html = '';
            bookings.forEach(b => {
                html += `
                <div class="border-b py-6 flex justify-between">
                    <div>
                        <div>${b.customer}</div>
                        <div class="text-sm text-gray-500">${b.service} - ${b.date} ${b.time}</div>
                    </div>
                    <div>${b.status}</div>
                </div>`;
            });
            document.getElementById('provider-bookings').innerHTML = html;
        }

        function renderAdminBookings() {
            let html = '';
            bookings.forEach(b => {
                html += `<div class="py-4 border-b">${b.customer} - ${b.service} with ${b.provider} on ${b.date}</div>`;
            });
            document.getElementById('admin-bookings').innerHTML = html;
        }

        // Initialize the website
        window.onload = () => {
            setRole('customer');
            switchPage('home');
        };
    </script>
</body>
</html>
